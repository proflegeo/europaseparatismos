                history: 'Epicentro do conflito e separatismo pró-Rússia iniciado em 2014. Foram reconhecidas como independentes pela Rússia pouco antes da invasão total da Ucrânia, sendo atualmente ocupadas e "anexadas" militarmente por Moscou.',
                task: 'Anote no caderno: Qual país patrocinou e posteriormente anexou o território dessas repúblicas separatistas?',
                quiz: { q: 'A atual situação de Donetsk e Luhansk é:', options: [
                    { text: 'Regiões pacíficas reintegradas à Ucrânia.', isCorrect: false },
                    { text: 'Ocupadas militarmente e anexadas ilegalmente pela Rússia.', isCorrect: true },
                    { text: 'Estados soberanos membros da União Europeia.', isCorrect: false }
                ]}
            },
            {
                id: 'crimeia', region: 'Crimeia', country: 'Ucrânia', lat: 45.3, lng: 34.3,
                culture: 'Península estratégica de maioria étnica e linguística russa.',
                history: 'O separatismo pró-Rússia culminou na anexação relâmpago e ilegal da península pela Federação Russa em 2014, após um referendo condenado por fraude pela comunidade internacional.',
                task: 'Anote no caderno: Em que ano ocorreu a crise separatista e posterior anexação da Crimeia?',
                quiz: { q: 'Do ponto de vista do Direito Internacional (ONU), a Crimeia é considerada:', options: [
                    { text: 'Território soberano e legal da Ucrânia, ocupado pela Rússia.', isCorrect: true },
                    { text: 'Uma nação independente recém-criada.', isCorrect: false },
                    { text: 'Propriedade histórica legal da Turquia.', isCorrect: false }
                ]}
            }
        ];

        /* ==========================================================================
           LÓGICA DO JOGO E SESSÃO ATUAL
           ========================================================================== */
        let sessionGameData = []; // Armazenará os 6 sorteados da partida
        let currentPhase = 0;
        let attempts = 0;
        let hits = 0;
        let activeRegion = null;
        let map = null;
        let markerGroup = null;

        const screens = {
            intro: document.getElementById('screen-intro'),
            map: document.getElementById('screen-map'),
            dossier: document.getElementById('screen-dossier'),
            boss: document.getElementById('screen-boss'),
            victory: document.getElementById('screen-victory')
        };

        function switchScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[screenName].classList.add('active');
        }

        function updateHUD() {
            document.getElementById('hud-level').innerText = `${Math.min(currentPhase + 1, sessionGameData.length)}/${sessionGameData.length}`;
            let accuracy = attempts === 0 ? 100 : Math.round((hits / attempts) * 100);
            document.getElementById('hud-score').innerText = `${accuracy}%`;
            document.getElementById('final-score').innerText = `${accuracy}%`;
        }

        // --- INICIALIZAÇÃO DA PARTIDA ---
        function startGame() {
            // Sorteia 6 regiões aleatórias do Master Database para esta partida
            sessionGameData = [...masterGameData].sort(() => Math.random() - 0.5).slice(0, 6);
            
            currentPhase = 0;
            attempts = 0;
            hits = 0;
            updateHUD();
            
            switchScreen('map');
            setTimeout(() => {
                initMap();
                loadMapPhase();
            }, 100);
        }

        function initMap() {
            if (!map) {
                map = L.map('map-container').setView([50.0, 10.0], 4);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; OpenStreetMap &copy; CARTO',
                    subdomains: 'abcd', maxZoom: 10, minZoom: 3
                }).addTo(map);
                markerGroup = L.layerGroup().addTo(map);
            } else {
                map.invalidateSize();
            }
        }

        function loadMapPhase() {
            activeRegion = sessionGameData[currentPhase];
            document.getElementById('map-prompt').innerHTML = `Missão: Encontre a base do movimento em <strong>${activeRegion.region}</strong>.`;
            document.getElementById('map-feedback').innerText = "";
            
            markerGroup.clearLayers(); 
            map.flyTo([activeRegion.lat - 2, activeRegion.lng + 2], 4, { duration: 1.5 });

            // Cria de 3 a 5 Distratores pelo mapa
            for(let i=0; i<4; i++) {
                let randomLat = Math.random() * (60 - 38) + 38; 
                let randomLng = Math.random() * (25 - (-9)) + (-9); 
                createRadarPin(randomLat, randomLng, false);
            }
            
            createRadarPin(activeRegion.lat, activeRegion.lng, true);
        }

        function createRadarPin(lat, lng, isTarget) {
            const customIcon = L.divIcon({
                className: 'custom-radar-wrapper',
                html: '<div class="radar-pin"></div>',
                iconSize: [24, 24], iconAnchor: [12, 12]
            });

            const marker = L.marker([lat, lng], { icon: customIcon }).addTo(markerGroup);
            marker.on('click', function(e) { handlePinClick(isTarget, e.target); });
        }

        function handlePinClick(isTarget, markerInstance) {
            attempts++;
            const feedback = document.getElementById('map-feedback');
            const pinElement = markerInstance.getElement().querySelector('.radar-pin');
            
            if(isTarget) {
                hits++;
                pinElement.classList.add('correct');
                feedback.innerText = "Alvo Confirmado! Baixando Dossiê...";
                feedback.style.color = 'var(--success)';
                updateHUD();
                
                markerGroup.eachLayer(layer => layer.off('click'));
                map.flyTo(markerInstance.getLatLng(), 6, { duration: 1 });
                
                setTimeout(() => loadDossierPhase(), 1500);
            } else {
                pinElement.classList.add('wrong');
                feedback.innerText = "Coordenada Errada. Tente outro sinal de radar.";
                feedback.style.color = 'var(--danger)';
                updateHUD();
            }
        }

        function loadDossierPhase() {
            document.getElementById('dossier-title').innerText = `Dossiê: ${activeRegion.region}`;
            document.getElementById('dossier-country').innerText = activeRegion.country;
            document.getElementById('dossier-culture').innerText = activeRegion.culture;
            document.getElementById('dossier-history').innerText = activeRegion.history;
            document.getElementById('dossier-task').innerText = activeRegion.task;
            
            document.getElementById('quiz-question').innerText = activeRegion.quiz.q;
            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';
            
            let options = [...activeRegion.quiz.options].sort(() => Math.random() - 0.5);
            const btnNext = document.getElementById('btn-next-mission');
            btnNext.disabled = true;

            options.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = 'quiz-option';
                btn.innerText = opt.text;
                btn.onclick = () => handleQuizAnswer(btn, opt.isCorrect, optionsContainer, btnNext);
                optionsContainer.appendChild(btn);
            });

            switchScreen('dossier');
        }

        function handleQuizAnswer(btnElement, isCorrect, container, nextBtn) {
            Array.from(container.children).forEach(child => {
                child.classList.remove('correct', 'wrong');
                child.style.pointerEvents = 'none';
            });

            if(isCorrect) {
                btnElement.classList.add('correct');
                nextBtn.disabled = false;
            } else {
                btnElement.classList.add('wrong');
                Array.from(container.children).forEach(child => {
                    let correctText = activeRegion.quiz.options.find(o => o.isCorrect).text;
                    if(child.innerText === correctText) child.classList.add('correct');
                });
                nextBtn.disabled = false;
            }
        }

        function nextPhase() {
            currentPhase++;
            if (currentPhase < sessionGameData.length) {
                updateHUD();
                switchScreen('map');
                setTimeout(() => {
                    map.invalidateSize();
                    loadMapPhase();
                }, 100);
            } else {
                loadBossPhase();
            }
        }

        // --- BOSS FINAL ---
        let selectedRegion = null;
        let selectedCountry = null;
        let matchPairsCompleted = 0;

        function loadBossPhase() {
            const grid = document.getElementById('matching-grid');
            grid.innerHTML = '';

            const colRegions = document.createElement('div'); colRegions.className = 'match-col';
            colRegions.innerHTML = '<h4>Movimento/Região</h4>';
            
            const colCountries = document.createElement('div'); colCountries.className = 'match-col';
            colCountries.innerHTML = '<h4>País Soberano</h4>';

            // Embaralha APENAS os 6 sorteados para o desafio final
            let regionsData = [...sessionGameData].sort(() => Math.random() - 0.5);
            let countriesData = [...sessionGameData].sort(() => Math.random() - 0.5);

            regionsData.forEach(item => {
                let div = document.createElement('div');
                div.className = 'match-item region-item';
                div.innerText = item.region;
                div.dataset.id = item.id;
                div.onclick = () => selectMatchItem('region', div);
                colRegions.appendChild(div);
            });

            countriesData.forEach(item => {
                let div = document.createElement('div');
                div.className = 'match-item country-item';
                div.innerText = item.country;
                div.dataset.id = item.id;
                div.onclick = () => selectMatchItem('country', div);
                colCountries.appendChild(div);
            });

            grid.appendChild(colRegions);
            grid.appendChild(colCountries);
            
            matchPairsCompleted = 0;
            switchScreen('boss');
        }

        function selectMatchItem(type, element) {
            if(element.classList.contains('matched')) return;

            document.querySelectorAll(`.${type}-item`).forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');

            if(type === 'region') selectedRegion = element;
            if(type === 'country') selectedCountry = element;

            checkMatch();
        }

        function checkMatch() {
            if(selectedRegion && selectedCountry) {
                if(selectedRegion.dataset.id === selectedCountry.dataset.id) {
                    selectedRegion.classList.remove('selected');
                    selectedCountry.classList.remove('selected');
                    selectedRegion.classList.add('matched');
                    selectedCountry.classList.add('matched');
                    
                    selectedRegion = null;
                    selectedCountry = null;
                    matchPairsCompleted++;

                    if(matchPairsCompleted === sessionGameData.length) {
                        setTimeout(() => switchScreen('victory'), 1000);
                    }
                } else {
                    selectedRegion.classList.add('error');
                    selectedCountry.classList.add('error');
                    
                    setTimeout(() => {
                        selectedRegion.classList.remove('error', 'selected');
                        selectedCountry.classList.remove('error', 'selected');
                        selectedRegion = null;
                        selectedCountry = null;
                    }, 500);
                }
            }
        }
    </script>
</body>
</html>
